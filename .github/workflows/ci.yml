name: CI

# Build and verify on pull requests (and pushes to non-main branches).
# This workflow NEVER deploys — GitHub Pages is published only by deploy.yml
# on push to main, so PRs and feature branches can't touch the live site.
on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

# Read-only: no pages/id-token permissions, so this workflow cannot deploy.
permissions:
  contents: read

# Cancel superseded runs on the same branch/PR (cheap feedback on rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build static export
        env:
          # Build under the production subpath for parity with deploy.yml.
          PAGES_BASE_PATH: /multimeter-live
        run: npm run build
